name: Payout Monitor

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 minutes
  workflow_dispatch:
    inputs:
      manual_payouts:
        description: 'JSON array of payouts to post manually (leave empty for normal run)'
        required: false
        default: ''

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for new payouts
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
        run: |
          if [ -n "${{ inputs.manual_payouts }}" ]; then
            python scripts/payout_monitor.py --manual '${{ inputs.manual_payouts }}'
          else
            python scripts/payout_monitor.py
          fi

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/tweeted_tx_hashes.txt state/payout_users.txt
          git diff --staged --quiet || git commit -m "chore: update payout state"
          git pull --rebase && git push
